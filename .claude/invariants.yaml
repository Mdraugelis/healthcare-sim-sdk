# SDK Architectural Invariants
# ============================================================
# This file is the machine-readable source of truth.
# Pre-commit hooks and pytest structural tests validate
# against these definitions.
# ============================================================

version: 1

protected_files:
  description: >
    Files that define the SDK contract. Modifications require
    maintainer review and should be rare. Scenario developers
    should never need to touch these.
  paths:
    - healthcare_sim_sdk/core/scenario.py
    - healthcare_sim_sdk/core/engine.py
    - healthcare_sim_sdk/core/rng.py
    - healthcare_sim_sdk/core/results.py

scenario_contract:
  class: BaseScenario
  module: healthcare_sim_sdk.core.scenario
  required_abstract_methods:
    - create_population
    - step
    - predict
    - intervene
    - measure
  optional_hooks:
    - validate_population
    - validate_results
    - clone_state

rng_contract:
  streams_class: RNGStreams
  partitioner_class: RNGPartitioner
  module: healthcare_sim_sdk.core.rng
  required_streams:
    - population
    - temporal
    - prediction
    - intervention
    - outcomes

banned_patterns:
  - pattern: "np\\.random\\."
    allowed_in:
      - healthcare_sim_sdk/core/rng.py
      - tests/
    message: >
      All randomness must flow through RNGPartitioner streams.
      Use self.rng.temporal, self.rng.population, etc.

  - pattern: "import random"
    allowed_in: []
    message: >
      Do not use Python stdlib random. Use RNGPartitioner streams.

engine_constraints:
  - name: state_opacity
    description: >
      The engine must never inspect state internals.
      No getattr, isinstance, hasattr, subscript, or
      attribute access on state variables.
    state_variable_names:
      - state_factual
      - state_counterfactual
      - state
      - state_snapshot

  - name: counterfactual_isolation
    description: >
      The counterfactual branch must never call predict().
      The causal question is: what if we had not deployed
      the AI at all?

fitness_criteria:
  description: >
    A use case fits the SDK if ALL of these are true.
    If any are false, flag it to the user before building.
  checks:
    - Population-level intervention (not individual decision support)
    - Predictive model drives the intervention
    - Intervention is a state change (not purely informational)
    - Measurable outcome at each timestep
    - Counterfactual causal question (what if no AI?)
    - Discrete-time dynamics (not fundamentally continuous)

analytical_first_pass:
  description: >
    Recommendation (not invariant): before building a scenario,
    evaluate whether the primary decision question can be
    answered in closed form. The SDK exists for problems that
    require Monte Carlo. Do not use it for problems a spreadsheet
    can answer. Both Phase-0 (analytical) and Phase-1 (SDK) work
    require the same verification protocol.
  closed_form_sufficient_for:
    - Power and minimum detectable effect (MDE) for a planned ITS / DiD
    - Causal-chain feasibility checks (sensitivity x action_rate x efficacy)
    - Bayes-bounded PPV / NNA at fixed prevalence
    - Coarse parameter sweeps where decisions hinge on point estimates
    - Equity arms expressed as deltas on the same point estimates
  sdk_required_for:
    - Per-seed variance, distributional tails, individual entity trajectories
    - Operator dynamics (alert fatigue half-life, capacity ceilings, queueing)
    - Time-to-action coupling and score-dependent intervention efficacy
    - Threshold selection that depends on the score distribution shape
    - Score ranking under capacity (top-K decisions, prioritization)
    - Calibration-dependent decisions (probability used as a probability)
    - AUC-to-PPV translation across operating points
    - Subgroup calibration / equity audits at the score-distribution level
    - Score-dependent efficacy (response is a function of score, not flag)
    - Rehearsing the planned analytic method on entity-level synthetic data
  validation_required_either_way:
    - Bayes constraint check on PPV given sensitivity, specificity, prevalence
    - Monotonicity check (lower threshold -> more flags;
      higher efficacy -> fewer events; effectiveness=0 -> factual==counterfactual)
    - Boundary conditions (threshold=0, threshold=1, AUC~0.5)
    - 4-sigma CLT bound check on simulated event rates against configured base rate
    - Sensitivity sweep around any point estimate the decision rests on
    - Explicit list of questions the analytical pass cannot answer
  reference_protocol: docs/analytical_first_pass.md
  worked_example: docs/analytical_first_pass.md
