# TREWS Replication Config
# Replicates the Targeted Real-time Early Warning System (TREWS)
# Adams et al., Nature Medicine 2022
#
# Key findings: TREWS achieved ~0.82 AUC with high clinician engagement,
# resulting in ~3 percentage-point mortality reduction for sepsis patients.
# The system used a targeted alert strategy (fewer, higher-quality alerts)
# with strong clinician buy-in and workflow integration.
#
# Citation: Adams R, et al. Prospective, multi-site study of patient outcomes
#           after implementation of the TREWS machine learning-based early
#           warning system for sepsis. Nature Medicine. 2022;28:1455-1460.

# --- Population ---
n_patients: 5000
sepsis_incidence: 0.04
risk_concentration: 0.5
mean_los_timesteps: 35
los_std_timesteps: 12

# --- ML Model ---
# TREWS achieved AUC ~0.82 in prospective validation
model_auc: 0.82
# Targeted alerting: flag top 7% (higher threshold = fewer, better alerts)
alert_threshold_percentile: 93

# --- Clinician Response ---
# Adams et al.: 89% of alerts evaluated, 38% of evaluated confirmed
# as sepsis. 61% of target sepsis patients confirmed within 3 hours.
# response_rate models probability of timely confirmation + treatment,
# not just evaluation. TREWS was decentralized (no dedicated staff);
# providers evaluated alerts at the bedside via Epic.
initial_response_rate: 0.60    # 61% confirmed within 3h (paper Fig 2)
fatigue_coefficient: 0.0005    # very low — TREWS sustained 89% eval rate
floor_response_rate: 0.30

# --- Intervention ---
# ~35% reduction in progression when treated early (meta-analysis)
treatment_effectiveness: 0.35
# No hard capacity constraint: TREWS was a decentralized bedside system
# with no dedicated staff. Every provider could evaluate alerts in Epic.
# Set high enough to be non-binding.
rapid_response_capacity: 200

# Kumar decay: effectiveness halves every 6 hours after sepsis onset
# (Kumar et al. 2006: each hour of delay increases mortality ~7.6%)
kumar_half_life_hours: 6.0
max_treatment_effectiveness: 0.50

# --- Stage Transition Probabilities ---
# Standard literature values
prog_at_risk: 0.008
prog_sepsis: 0.025
prog_severe: 0.040
mort_sepsis: 0.002
mort_severe: 0.008
mort_shock: 0.025

# --- Temporal ---
ar1_rho: 0.90
ar1_sigma: 0.06

# --- Baseline Clinical Detection (standard of care, both branches) ---
# CMS SEP-1 bundle compliance: ~6hr median detection via routine care
# Beta(2,5) * 24h: mean ~6.9h, median ~5.8h, right-skewed tail
baseline_detection_enabled: true
baseline_detect_alpha: 2.0
baseline_detect_beta: 5.0
baseline_detect_max_hours: 24.0

# --- Simulation ---
n_timesteps: 42  # 7 days
prediction_schedule: "all"

# --- Expected Results ---
# Under these parameters, simulation should show:
# - Factual mortality ~3pp lower than counterfactual
# - High clinician engagement sustained over the simulation period
# - Alert volume manageable within capacity constraints
