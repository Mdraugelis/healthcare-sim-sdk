# Regime D — Capacity Collapse
# Capacity drops from 6 to 2 at week 30 (step change).
# Expected: Tier 1 detects within 2 weeks (adherence drops).
# Tier 2 CUSUM detects downstream outcome degradation within 8-12 wk.

defaults:
  - base

regime: capacity_collapse
policy:
  max_interventions_per_week:
    base: 6.0
    change_points:
      - [30, 2.0]
    interpolation: step
