# Regime E — Model Drift
# Model AUC drifts from 0.80 to 0.60 between weeks 20 and 40.
# Expected: Tier 4 detects AUC drop within 4 weeks of crossing 0.65.
# Tier 2 may or may not detect downstream effects (SOC absorbs load).

defaults:
  - base

regime: model_drift
model:
  auc:
    base: 0.80
    change_points:
      - [20, 0.80]
      - [40, 0.60]
    interpolation: linear
