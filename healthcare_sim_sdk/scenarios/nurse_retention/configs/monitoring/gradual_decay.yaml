# Regime C — Gradual Decay
# Effectiveness starts at 0.50, ramps linearly to 0.0 between
# weeks 26 and 52, stays at 0.0 thereafter.
# Expected: Tier 2 CUSUM detects drift before week 40.
# Tier 3 shows declining quarterly estimate from week 52 onward.

defaults:
  - base

regime: gradual_decay
policy:
  effectiveness:
    base: 0.50
    change_points:
      - [26, 0.50]
      - [52, 0.0]
    interpolation: linear
